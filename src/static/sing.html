<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso · Wago</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css?v=3" />
    <style>
        body {
            background: radial-gradient(circle at top, rgba(16, 185, 129, 0.05) 0%, var(--color-bg-base) 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .brand img {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .brand span {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--color-text-main);
        }

        .brand span small {
            font-weight: 400;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 20px 0 6px;
        }

        .sub {
            color: var(--color-text-muted);
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        .btn-login {
            width: 100%;
            margin-top: 10px;
        }

        .register-link {
            margin-top: 24px;
            text-align: center;
            font-size: 0.95rem;
            color: var(--color-text-muted);
        }

        .register-link a {
            color: var(--color-primary);
            font-weight: 600;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--color-text-muted);
            font-size: 0.9rem;
            margin-bottom: 16px;
            text-decoration: none;
        }

        .back-home:hover {
            color: var(--color-primary);
        }
    </style>
</head>

<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema"
        style="position:fixed; top:24px; right:24px; z-index:100;">
        <i class="fas fa-moon"></i>
    </button>

    <div class="login-wrapper glass-card reveal">
        <div class="premium-card-body">
            <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> Volver</a>
            <div class="brand">
                <img src="assets/Copilot_20260709_045019.png" alt="Wago" />
                <span>Wago <small>· acceso</small></span>
            </div>
            <h2>Inicia sesión</h2>
            <p class="sub">Accede a tu panel de control</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="model">Usuario o email</label>
                    <input type="text" id="model" class="form-control" placeholder="Ej: admin o correo@ejemplo.com"
                        required />
                </div>
                <div class="form-group">
                    <label for="pass">Contraseña</label>
                    <input type="password" id="pass" class="form-control" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary btn-login">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>
            <a href="/auth/google/login">Iniciar con Google</a>
            <div class="register-link">
                ¿No tienes cuenta? <a href="/register">Regístrate</a>
            </div>
        </div>
    </div>

    <script src="/assets/js/main.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginWrapper = document.querySelector('.login-wrapper');
            loginWrapper.classList.add('visible');
        });

        function getCsrfToken() {
            const match = document.cookie.match(new RegExp('(^| )csrf_token=([^;]+)'));
            return match ? match[2] : '';
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const model = document.getElementById('model').value.trim();
            const pass = document.getElementById('pass').value.trim();

            if (!model || !pass) {
                Toast.show('Todos los campos son obligatorios.', 'error');
                return;
            }
            try {
                const r = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': getCsrfToken()
                    },
                    body: JSON.stringify({ username: model, email: model, password: pass })
                });
                const data = await r.json();
                if (r.ok) {
                    Toast.show('Inicio de sesión exitoso.', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 800);
                } else if (r.status === 401) {
                    Toast.show('Credenciales incorrectas.', 'error');
                } else {
                    Toast.show(data.error || 'Error del servidor.', 'error');
                }
            } catch (e) {
                Toast.show('Error de red. Verifica tu conexión.', 'error');
            }
        });

        document.querySelectorAll('input').forEach(inp => inp.addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }));

        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('themeToggle');
        if (themeToggleBtn) {
            const icon = themeToggleBtn.querySelector('i');
            const currentTheme = localStorage.getItem('theme') || 'dark';
            if (currentTheme === 'light') {
                document.documentElement.classList.add('light-theme');
                icon.classList.replace('fa-moon', 'fa-sun');
            }
            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('light-theme');
                if (document.documentElement.classList.contains('light-theme')) {
                    localStorage.setItem('theme', 'light');
                    icon.classList.replace('fa-moon', 'fa-sun');
                } else {
                    localStorage.setItem('theme', 'dark');
                    icon.classList.replace('fa-sun', 'fa-moon');
                }
            });
        }
    </script>
</body>

</html>
